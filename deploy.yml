name: Deploy BRAYAN_OS → GitHub Pages

on:
  # Dispara automaticamente em qualquer push para a branch main
  push:
    branches:
      - main

  # Permite rodar manualmente pelo painel Actions do GitHub
  workflow_dispatch:

# Permissões necessárias para publicar no GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Garante que apenas um deploy rode por vez
# Se um novo push chegar enquanto um deploy está em andamento,
# o anterior é cancelado (não falha — apenas interrompido)
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy para GitHub Pages
    runs-on: ubuntu-latest

    # Configura o ambiente de publicação do GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. Faz checkout do repositório
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Configura o GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 3. Empacota os arquivos estáticos como artefato de deploy
      #    O parâmetro "path: ." publica a raiz do repositório
      #    Arquivos sensíveis (.github, .git) são excluídos automaticamente
      - name: Upload artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      # 4. Publica no GitHub Pages
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
